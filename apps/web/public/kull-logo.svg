<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- خلفية دائرة متدرجة -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d4f30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a017;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- الدائرة الرئيسية -->
  <circle cx="200" cy="200" r="185" fill="url(#bgGrad)" />

  <!-- حلقة ذهبية خارجية -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#goldGrad)" stroke-width="6" />

  <!-- النص العربي كُـل -->
  <text x="200" y="230" font-family="'Segoe UI', 'Arial', sans-serif" font-size="130" font-weight="bold"
        text-anchor="middle" fill="white" letter-spacing="4">كُـل</text>

  <!-- خط ذهبي تحت النص -->
  <rect x="100" y="258" width="200" height="5" rx="3" fill="url(#goldGrad)" />

  <!-- نص صغير بالإنجليزية -->
  <text x="200" y="305" font-family="'Segoe UI', 'Arial', sans-serif" font-size="28" font-weight="600"
        text-anchor="middle" fill="#f5c842" letter-spacing="8">KULL</text>

  <!-- نص توضيحي -->
  <text x="200" y="340" font-family="'Segoe UI', 'Arial', sans-serif" font-size="18"
        text-anchor="middle" fill="rgba(255,255,255,0.75)" letter-spacing="2">سوق السودان الإلكتروني</text>
</svg>
